{% extends "base.html" %}
{% block title %}仙人Tube++ - ホーム{% endblock %}

{% block content %}
<div class="chips-bar" id="home-chips">
  <span class="chip active" onclick="loadFeed('trending')">📈 急上昇</span>
  <span class="chip" onclick="loadFeed('music')">🎵 音楽</span>
  <span class="chip" onclick="loadFeed('gaming')">🎮 ゲーム</span>
  <span class="chip" onclick="loadFeed('news')">📰 ニュース</span>
  <span class="chip" onclick="loadFeed('anime')">🎌 アニメ</span>
  <span class="chip" onclick="loadFeed('sports')">⚽ スポーツ</span>
  <span class="chip" onclick="loadFeed('tech')">💻 テクノロジー</span>
  <span class="chip" onclick="loadFeed('cooking')">🍜 料理</span>
</div>

<div id="video-feed">
  <div class="spinner"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
const QUERIES = {
  trending: '急上昇 日本',
  music: '音楽 MV 新曲',
  gaming: 'ゲーム実況',
  news: 'ニュース 今日',
  anime: 'アニメ',
  sports: 'スポーツ',
  tech: 'テクノロジー',
  cooking: '料理 レシピ',
};

let currentFeed = 'trending';
let currentPage = 1;
let loading = false;

document.querySelectorAll('.chip').forEach(c => {
  c.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(x => x.classList.remove('active'));
    c.classList.add('active');
  });
});

async function loadFeed(type, append = false) {
  if (loading) return;
  loading = true;
  currentFeed = type;
  const feed = document.getElementById('video-feed');
  if (!append) {
    feed.innerHTML = '<div class="spinner"></div>';
    currentPage = 1;
  }

  const q = QUERIES[type] || type;
  const inst = localStorage.getItem('instance') || '';
  const instParam = inst ? `&force_instance=${encodeURIComponent(inst)}` : '';
  const url = `/search?q=${encodeURIComponent(q)}&page=${currentPage}${instParam}`;

  try {
    const res = await fetch(url, { headers: { 'X-Requested-With': 'XMLHttpRequest' } });
    const text = await res.text();
    const parser = new DOMParser();
    const doc = parser.parseFromString(text, 'text/html');
    const cards = doc.querySelectorAll('.video-card');
    if (!append) feed.innerHTML = '';

    const grid = append ? feed.querySelector('.video-grid') : null;
    if (!grid && !append) {
      const g = document.createElement('div');
      g.className = 'video-grid';
      feed.appendChild(g);
      cards.forEach(c => g.appendChild(c.cloneNode(true)));
    } else if (grid) {
      cards.forEach(c => grid.appendChild(c.cloneNode(true)));
    }
    currentPage++;
  } catch(e) {
    feed.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text2)">読み込みに失敗しました。再試行してください。</div>';
  }
  loading = false;
}

// Infinite scroll
window.addEventListener('scroll', () => {
  if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 600 && !loading) {
    loadFeed(currentFeed, true);
  }
});

loadFeed('trending');
</script>
{% endblock %}
